<div class="container" fxLayout="column" fxLayoutGap="40px">
    <span class="title">{{ message }}</span>
    <div class="actions" fxLayout="row" fxLayoutGap="32px">
        <button (click)="handleActionModal()" fxFlex="50" class="btn" [ngClass]="btnStyle">{{ btnMessage }}</button>
        <button (click)="handleCancel()" fxFlex="50" class="btn btn-warning">Annuler</button>
    </div>
</div>
